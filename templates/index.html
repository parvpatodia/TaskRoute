<!DOCTYPE html>
<html>
<head>
    <title>TaskRoute</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f7f7f7;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            background: black;
            color: white;
            border: none;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
        }

        #result {
            margin-top: 20px;
            background: #efefef;
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>TaskRoute</h2>
<p>AI Execution Planner for Agents</p>

<label>Task Type</label>
<select id="task">
<option value="text_generation">Text Generation</option>
<option value="image_generation">Image Generation</option>
<option value="web_scraping">Web Scraping</option>
</select>

<label>Budget (USD)</label>
<input id="budget" type="number" step="0.001">

<label>Priority</label>
<select id="priority">
<option value="cost">Lowest Cost</option>
<option value="speed">Fastest</option>
<option value="quality">Best Quality</option>
</select>

<button onclick="optimize()">Optimize Task</button>

<div id="result"></div>

</div>

<script>

async function optimize(){

    const task = document.getElementById("task").value
    const budget = parseFloat(document.getElementById("budget").value)
    const priority = document.getElementById("priority").value

    const response = await fetch("/optimize",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            task_type:task,
            budget_usd:budget,
            priority:priority
        })
    })

    const data = await response.json()

    document.getElementById("result").innerHTML =
    "<h3>Recommendations</h3>" +

    "<b>Best Cost:</b> " + data.recommendations.best_cost.name +
    " (" + data.recommendations.best_cost.provider + ") $" +
    data.recommendations.best_cost.estimated_cost +
    "<br><i>" + data.analysis.best_cost_reason + "</i><br><br>" +

    "<b>Best Quality:</b> " + data.recommendations.best_quality.name +
    " (" + data.recommendations.best_quality.provider + ") $" +
    data.recommendations.best_quality.estimated_cost +
    "<br><i>" + data.analysis.best_quality_reason + "</i><br><br>" +

    "<b>Best Speed:</b> " + data.recommendations.best_speed.name +
    " (" + data.recommendations.best_speed.provider + ") $" +
    data.recommendations.best_speed.estimated_cost +
    "<br><i>" + data.analysis.best_speed_reason + "</i>";
}

</script>

</body>
</html>
